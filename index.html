<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kymatix v2.3 // Obsidian Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #f7d08a;
            --accent2: #e87878;
            --glass: rgba(10, 10, 18, 0.88);
            --line-width: 60px;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Syne',sans-serif; user-select:none; -webkit-user-select:none; }
        body { background:#050508; cursor:none; overflow:hidden; }

        /* ── CURSOR ── */
        #cursor {
            position:fixed; width:18px; height:18px;
            border:1.5px solid var(--accent); border-radius:50%;
            pointer-events:none; z-index:9999;
            transition:transform 0.05s linear, width 0.2s, height 0.2s, border-color 0.2s;
            mix-blend-mode:difference;
        }
        #cursor.big { width:40px; height:40px; border-color:rgba(247,208,138,0.5); }

        /* ── CANVAS ── */
        #canvas { position:fixed; top:0; left:0; z-index:1; }

        /* ════════════════════════════════
           INTRO SEQUENCE
        ════════════════════════════════ */
        #intro {
            position:fixed; inset:0; z-index:500;
            background:#050508;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            gap:0;
        }

        .intro-line {
            overflow:hidden; position:relative;
        }

        .intro-word {
            display:inline-block;
            font-size:clamp(4rem, 12vw, 10rem);
            font-weight:800;
            letter-spacing:-6px;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip:text; background-clip:text;
            -webkit-text-fill-color:transparent;
            transform:translateY(110%);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .intro-sub {
            font-size:0.7rem; letter-spacing:10px; color:rgba(255,255,255,0.25);
            opacity:0; margin-top:20px;
            animation: fadeUp 0.8s ease forwards 1.2s;
        }

        .intro-bar {
            width:0; height:2px; background:var(--accent);
            margin-top:30px;
            box-shadow:0 0 30px var(--accent);
            animation:barGrow 1.2s cubic-bezier(0.16,1,0.3,1) forwards 0.8s;
        }

        .intro-tagline {
            font-size:0.65rem; letter-spacing:6px; color:rgba(255,255,255,0.15);
            opacity:0; margin-top:16px;
            animation: fadeUp 0.8s ease forwards 1.8s;
        }

        /* Scan-line effect over intro */
        .intro-scan {
            position:absolute; inset:0; pointer-events:none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0,0,0,0.07) 3px,
                rgba(0,0,0,0.07) 4px
            );
        }

        /* Glowing orb behind text */
        .intro-orb {
            position:absolute; width:500px; height:500px; border-radius:50%;
            background: radial-gradient(circle, rgba(247,208,138,0.06) 0%, transparent 70%);
            pointer-events:none;
            animation: orbPulse 3s ease-in-out infinite;
        }

        /* Countdown ring */
        .intro-ring {
            position:absolute;
            width:300px; height:300px;
            border-radius:50%;
            border:1px solid rgba(247,208,138,0.08);
            animation: ringExpand 2s cubic-bezier(0.16,1,0.3,1) forwards 0.3s;
            opacity:0;
        }
        .intro-ring:nth-child(2) { animation-delay:0.6s; }
        .intro-ring:nth-child(3) { animation-delay:0.9s; }

        @keyframes slideUp {
            to { transform:translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(12px); }
            to   { opacity:1; transform:translateY(0); }
        }
        @keyframes barGrow {
            to { width:80px; }
        }
        @keyframes orbPulse {
            0%,100% { transform:scale(1); opacity:0.5; }
            50%      { transform:scale(1.15); opacity:1; }
        }
        @keyframes ringExpand {
            from { opacity:0; transform:scale(0.5); }
            to   { opacity:1; transform:scale(1); }
        }
        @keyframes introOut {
            0%   { opacity:1; transform:scale(1); }
            100% { opacity:0; transform:scale(1.04); pointer-events:none; }
        }
        .intro-exit {
            animation: introOut 0.9s cubic-bezier(0.16,1,0.3,1) forwards !important;
        }

        /* ════════════════════════════════
           MAIN UI PANEL
        ════════════════════════════════ */
        #ui-layer {
            position:fixed; z-index:100;
            top:50%; left:50%; transform:translate(-50%,-50%);
            background:var(--glass); backdrop-filter:blur(60px);
            border:1px solid rgba(255,255,255,0.07);
            padding:60px 70px; border-radius:40px; text-align:center;
            box-shadow:0 60px 140px rgba(0,0,0,0.95), 0 0 0 1px rgba(255,255,255,0.03);
            transition:all 0.9s cubic-bezier(0.19,1,0.22,1);
            opacity:0; visibility:hidden;
            transform:translate(-50%,-48%) scale(0.96);
        }
        #ui-layer.visible {
            opacity:1; visibility:visible;
            transform:translate(-50%,-50%) scale(1);
        }
        #ui-layer.hidden {
            opacity:0; visibility:hidden;
            transform:translate(-50%,-45%) scale(0.95);
        }

        h1 {
            font-size:5rem; font-weight:800; letter-spacing:-5px;
            background:linear-gradient(to bottom, #fff, #666);
            background-clip:text; -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            line-height:1;
        }
        h1::after {
            content:''; display:block; width:var(--line-width); height:4px;
            background:var(--accent); margin:22px auto;
            border-radius:10px; box-shadow:0 0 30px var(--accent);
            transition:width 0.1s ease;
        }

        .version-tag {
            letter-spacing:8px; opacity:0.2;
            margin-bottom:45px; font-size:0.65rem; color:white;
        }

        .upload-btn {
            position:relative; display:inline-block;
            background:white; color:black;
            padding:20px 45px; border-radius:100px;
            font-weight:900; font-size:0.85rem;
            letter-spacing:2px; text-transform:uppercase;
            cursor:pointer; border:none;
            transition:transform 0.3s, box-shadow 0.3s;
        }
        .upload-btn:hover {
            transform:scale(1.05);
            box-shadow:0 0 50px rgba(255,255,255,0.25);
        }
        .upload-btn input[type="file"] {
            position:absolute; inset:0; opacity:0;
            width:100%; height:100%; cursor:pointer;
        }

        /* ════════════════════════════════
           BOTTOM CONTROLS
        ════════════════════════════════ */
        .controls {
            position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
            z-index:200;
            display:flex; gap:16px; align-items:center;
            opacity:0; pointer-events:none;
            transition: opacity 0.5s ease;
        }
        .controls.visible {
            opacity:1; pointer-events:all;
        }

        .ctrl-btn {
            background:rgba(255,255,255,0.05);
            color:white; padding:14px 30px;
            border-radius:100px; font-weight:800;
            font-size:0.8rem; letter-spacing:2px;
            border:1px solid rgba(255,255,255,0.1);
            backdrop-filter:blur(20px); cursor:pointer;
            transition:all 0.3s; text-transform:uppercase;
        }
        .ctrl-btn:hover {
            background:rgba(255,255,255,0.12);
            border-color:rgba(255,255,255,0.25);
            transform:translateY(-2px);
        }
        .ctrl-btn.active {
            background:rgba(247,208,138,0.12);
            border-color:rgba(247,208,138,0.4);
            color:var(--accent);
        }

        /* Pause indicator dot */
        .ctrl-btn#pause-btn::before {
            content:''; display:inline-block;
            width:7px; height:7px; border-radius:50%;
            background:#5ddf8a; margin-right:10px;
            vertical-align:middle;
            box-shadow:0 0 10px #5ddf8a;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .ctrl-btn#pause-btn.paused::before {
            background:var(--accent2);
            box-shadow:0 0 10px var(--accent2);
        }

        /* ── track name badge ── */
        #track-badge {
            position:fixed; top:36px; left:50%; transform:translateX(-50%);
            z-index:200; opacity:0; pointer-events:none;
            transition:opacity 0.6s ease;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            backdrop-filter:blur(20px);
            padding:10px 24px; border-radius:100px;
            font-size:0.7rem; letter-spacing:4px; color:rgba(255,255,255,0.4);
            text-transform:uppercase;
        }
        #track-badge.visible { opacity:1; }
    </style>
</head>
<body>

<div id="cursor"></div>
<canvas id="canvas"></canvas>

<!-- ── INTRO ── -->
<div id="intro">
    <div class="intro-orb"></div>
    <div class="intro-ring"></div>
    <div class="intro-ring"></div>
    <div class="intro-ring"></div>
    <div class="intro-line">
        <span class="intro-word" style="animation-delay:0.1s">KYMATIX</span>
    </div>
    <p class="intro-sub">OBSIDIAN ULTRA // V2.3</p>
    <div class="intro-bar"></div>
    <p class="intro-tagline">REACTIVE AUDIO VISUALISER</p>
    <div class="intro-scan"></div>
</div>

<!-- ── MAIN PANEL ── -->
<div id="ui-layer">
    <h1>KYMATIX</h1>
    <p class="version-tag">OBSIDIAN ULTRA // V2.3</p>
    <label class="upload-btn">
        INITIALIZE AUDIO
        <input type="file" id="audioInput" accept="audio/*">
    </label>
</div>

<!-- ── TRACK BADGE ── -->
<div id="track-badge" id="track-badge">▶ —</div>

<!-- ── CONTROLS ── -->
<div class="controls" id="controls">
    <button class="ctrl-btn" id="pause-btn">PLAYING</button>
    <button class="ctrl-btn" id="snapshot-btn">CAPTURE</button>
</div>

<script>
    /* ── DOM ── */
    const canvas      = document.getElementById('canvas');
    const ctx         = canvas.getContext('2d');
    const ui          = document.getElementById('ui-layer');
    const cursorEl    = document.getElementById('cursor');
    const audioInput  = document.getElementById('audioInput');
    const pauseBtn    = document.getElementById('pause-btn');
    const snapshotBtn = document.getElementById('snapshot-btn');
    const controls    = document.getElementById('controls');
    const intro       = document.getElementById('intro');
    const trackBadge  = document.getElementById('track-badge');

    /* ── STATE ── */
    let audioCtx, analyzer, frequencyData, source;
    let isPlaying = false;
    let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };
    let rotation = 0;
    let particlePool = [];
    let frameCount = 0;

    /* ── CANVAS SIZE ── */
    function initCanvas() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', initCanvas);
    initCanvas();

    /* ── INTRO → UI TRANSITION ── */
    setTimeout(() => {
        intro.classList.add('intro-exit');
        setTimeout(() => {
            intro.style.display = 'none';
            ui.classList.add('visible');
        }, 900);
    }, 3200);

    /* ── CURSOR ── */
    window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        cursorEl.style.transform = `translate(${e.clientX - 9}px, ${e.clientY - 9}px)`;

        if (isPlaying) {
            const edge = 120;
            if (e.clientY < edge || e.clientY > window.innerHeight - edge) {
                ui.classList.remove('hidden');
                ui.classList.add('visible');
            } else {
                ui.classList.remove('visible');
                ui.classList.add('hidden');
            }
        }
    });

    /* Enlarge cursor over interactive elements */
    document.querySelectorAll('button, label, input').forEach(el => {
        el.addEventListener('mouseenter', () => cursorEl.classList.add('big'));
        el.addEventListener('mouseleave', () => cursorEl.classList.remove('big'));
    });

    /* ── AUDIO LOAD ── */
    audioInput.onchange = function () {
        const file = this.files[0];
        if (!file) return;

        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        ui.classList.remove('visible');
        ui.classList.add('hidden');
        controls.classList.add('visible');

        const name = file.name.replace(/\.[^/.]+$/, '').toUpperCase();
        trackBadge.textContent = '▶ ' + name;
        trackBadge.classList.add('visible');

        pauseBtn.textContent  = 'PLAYING';
        pauseBtn.classList.remove('paused');

        const reader = new FileReader();
        reader.onload = e => audioCtx.decodeAudioData(e.target.result, setupAudio);
        reader.readAsArrayBuffer(file);
    };

    function setupAudio(buffer) {
        if (source) { try { source.stop(); } catch(e){} }

        analyzer = audioCtx.createAnalyser();
        analyzer.fftSize = 1024;
        analyzer.smoothingTimeConstant = 0.82;

        source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(analyzer);
        analyzer.connect(audioCtx.destination);
        source.start(0);

        frequencyData = new Uint8Array(analyzer.frequencyBinCount);
        isPlaying = true;
        render();
    }

    /* ── PAUSE ── */
    pauseBtn.onclick = () => {
        if (!audioCtx) return;
        if (audioCtx.state === 'running') {
            audioCtx.suspend().then(() => {
                pauseBtn.textContent = 'PAUSED';
                pauseBtn.classList.add('paused');
                trackBadge.textContent = trackBadge.textContent.replace('▶','⏸');
            });
        } else {
            audioCtx.resume().then(() => {
                pauseBtn.textContent = 'PLAYING';
                pauseBtn.classList.remove('paused');
                trackBadge.textContent = trackBadge.textContent.replace('⏸','▶');
            });
        }
    };

    /* ── SNAPSHOT ── */
    snapshotBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = `KYMATIX_${Date.now()}.png`;
        link.href = canvas.toDataURL();
        link.click();
    };

    /* ── PARTICLES ── */
    function spawnParticle(x, y, hue, vel) {
        particlePool.push({
            x, y,
            vx: (Math.random()-0.5)*vel,
            vy: (Math.random()-0.5)*vel - Math.random()*2,
            life: 1, hue, size: Math.random()*3+1
        });
    }

    function updateParticles() {
        for (let i = particlePool.length-1; i >= 0; i--) {
            const p = particlePool[i];
            p.x += p.vx; p.y += p.vy;
            p.vy += 0.04; // gravity
            p.life -= 0.018;
            if (p.life <= 0) { particlePool.splice(i,1); continue; }
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
            ctx.fillStyle = `hsla(${p.hue},90%,70%,${p.life * 0.6})`;
            ctx.fill();
        }
    }

    /* ── RENDER ── */
    function render() {
        if (!isPlaying) return;
        requestAnimationFrame(render);
        frameCount++;

        analyzer.getByteFrequencyData(frequencyData);

        const bass   = frequencyData[8];
        const mid    = frequencyData[40];
        const treble = frequencyData[110];

        // Update accent bar width
        ui.style.setProperty('--line-width', `${60 + bass * 0.8}px`);

        const cx = canvas.width  / 2;
        const cy = canvas.height / 2;

        // Motion-blur trail
        const running = audioCtx && audioCtx.state === 'running';
        ctx.fillStyle = running ? 'rgba(5,5,8,0.15)' : 'rgba(5,5,8,0.5)';
        ctx.fillRect(0,0,canvas.width,canvas.height);

        if (!running) return;

        rotation += 0.0015 + bass * 0.000025;

        const hueBase = (frameCount * 0.4 + bass * 0.3) % 360;

        /* ── OUTER FREQUENCY RING ── */
        const arms = 16;
        for (let arm = 0; arm < arms; arm++) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate((Math.PI*2/arms)*arm + rotation);

            // Mouse gravity
            const dx = (mouse.x - cx) * 0.035;
            const dy = (mouse.y - cy) * 0.035;
            ctx.translate(dx, dy);

            drawArm(frequencyData, hueBase, arm, bass);
            ctx.restore();
        }

        /* ── CENTRAL WAVEFORM ── */
        drawCenterWave(cx, cy, hueBase, bass, mid);

        /* ── BASS PULSE RING ── */
        if (bass > 160) {
            const r = bass * 1.4;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI*2);
            ctx.strokeStyle = `hsla(${hueBase+30},100%,70%,${(bass-160)/300})`;
            ctx.lineWidth = 1;
            ctx.stroke();

            if (bass > 210 && frameCount % 3 === 0) {
                for (let p=0;p<3;p++) {
                    const a = Math.random()*Math.PI*2;
                    spawnParticle(cx+Math.cos(a)*r, cy+Math.sin(a)*r, hueBase, bass*0.04);
                }
            }
        }

        /* ── TREBLE SPARKS ── */
        if (treble > 180 && frameCount % 2 === 0) {
            const a = Math.random()*Math.PI*2;
            const dist = 80 + Math.random()*200;
            spawnParticle(cx+Math.cos(a)*dist, cy+Math.sin(a)*dist, hueBase+120, 3);
        }

        updateParticles();
    }

    function drawArm(data, hueBase, armIndex, bass) {
        ctx.beginPath();

        const hue = (hueBase + armIndex * 22) % 360;
        const alpha = 0.55 + bass/600;
        ctx.strokeStyle = `hsla(${hue},85%,65%,${alpha})`;
        ctx.lineWidth = 1.5;
        ctx.shadowBlur = 18 + bass*0.06;
        ctx.shadowColor = `hsla(${hue},100%,55%,0.5)`;
        ctx.lineJoin = 'round';

        const step = 6;
        for (let i=0; i < data.length; i += step) {
            const mag   = data[i] * 1.6;
            const angle = (i / data.length) * Math.PI * 2;
            const r     = mag + i * 0.35;
            const x     = Math.cos(angle) * r;
            const y     = Math.sin(angle) * r;
            i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);

            // spiky highlight on peaks
            if (data[i] > 220) {
                ctx.strokeRect(x-1.5,y-1.5,3,3);
            }
        }
        ctx.stroke();
    }

    function drawCenterWave(cx, cy, hueBase, bass, mid) {
        const waveLen = 256;
        const waveData = new Uint8Array(waveLen);
        analyzer.getByteTimeDomainData(waveData);

        const w = Math.min(canvas.width * 0.55, 600);
        const h = 80 + mid * 0.5;
        const startX = cx - w/2;

        ctx.beginPath();
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = `hsla(${hueBase},70%,75%,0.55)`;
        ctx.shadowBlur = 12;
        ctx.shadowColor = `hsla(${hueBase},100%,60%,0.3)`;

        for (let i=0; i<waveLen; i++) {
            const x = startX + (i/waveLen)*w;
            const v = (waveData[i]/128.0) - 1.0;
            const y = cy + v * h;
            i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.stroke();

        // Mirror
        ctx.beginPath();
        ctx.strokeStyle = `hsla(${hueBase+180},60%,70%,0.25)`;
        for (let i=0; i<waveLen; i++) {
            const x = startX + (i/waveLen)*w;
            const v = (waveData[i]/128.0) - 1.0;
            const y = cy - v * h * 0.5;
            i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.stroke();
    }
</script>
</body>
</html>
