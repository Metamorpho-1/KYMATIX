<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kymatix // Obsidian Ultra V3</title>
    <style>
        :root {
            --accent: #f7d08a;
            --glass: rgba(15, 15, 26, 0.9);
            --line-width: 60px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Syne', sans-serif; user-select: none; }
        body { background: #050508; color: white; overflow: hidden; cursor: none; }

        /* --- 1. THE SEXY INTRO --- */
        #intro-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: #050508; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 1.5s ease, transform 1.5s ease;
        }

        .terminal-text {
            font-family: monospace; font-size: 0.8rem; color: var(--accent);
            margin-bottom: 20px; opacity: 0.7;
        }

        .loader-bar {
            width: 200px; height: 2px; background: rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
        }

        .loader-progress {
            position: absolute; width: 100%; height: 100%;
            background: var(--accent); left: -100%;
            animation: load 2.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes load { to { left: 0; } }

        /* --- 2. THE PLAYER & UI --- */
        #ui-layer {
            position: fixed; z-index: 100;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--glass); backdrop-filter: blur(50px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 60px; border-radius: 40px; text-align: center;
            box-shadow: 0 50px 120px rgba(0,0,0,0.9);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        h1 { font-size: 5rem; font-weight: 800; letter-spacing: -5px; background: linear-gradient(to bottom, #fff, #777); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h1::after { content: ''; display: block; width: var(--line-width); height: 5px; background: var(--accent); margin: 25px auto; border-radius: 10px; box-shadow: 0 0 30px var(--accent); transition: width 0.1s ease; }

        /* Scrubbing Bar */
        #player-container {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 40%; min-width: 300px; z-index: 101;
            background: var(--glass); padding: 20px; border-radius: 20px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 15px;
            transition: opacity 0.5s ease;
        }

        input[type="range"] {
            flex-grow: 1; appearance: none; background: rgba(255,255,255,0.1);
            height: 4px; border-radius: 2px; outline: none; cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 12px; height: 12px;
            background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent);
        }

        #cursor { position: fixed; width: 15px; height: 15px; border: 2px solid var(--accent); border-radius: 50%; pointer-events: none; z-index: 3000; transition: transform 0.05s linear; mix-blend-mode: difference; }

        .btn { background: white; color: black; padding: 15px 30px; border-radius: 100px; font-weight: 900; cursor: pointer; transition: 0.3s; border: none; text-transform: uppercase; font-size: 0.7rem; }
        .hidden { opacity: 0; pointer-events: none; }
        .v-hidden { visibility: hidden; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="cursor"></div>

    <div id="intro-overlay">
        <div class="terminal-text" id="terminal">SYST_INIT: KYMATIX_OBSIDIAN_V3...</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <h1>KYMATIX</h1>
        <p style="letter-spacing: 8px; opacity: 0.3; margin-bottom: 40px; font-size: 0.6rem;">EXPERIMENTAL AUDIO ENGINE</p>
        <button class="btn">
            INITIALIZE ENGINE
            <input type="file" id="audioInput" accept="audio/*" style="position:absolute; opacity:0; inset:0; cursor:pointer;">
        </button>
    </div>

    <div id="player-container" class="hidden">
        <button id="playPause" class="btn" style="padding: 10px 20px;">▌▌</button>
        <input type="range" id="progressBar" value="0" step="0.1">
        <span id="time" style="font-size: 0.7rem; font-family: monospace; opacity: 0.6;">00:00</span>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const intro = document.getElementById('intro-overlay');
    const ui = document.getElementById('ui-layer');
    const audioInput = document.getElementById('audioInput');
    const player = document.getElementById('player-container');
    const progressBar = document.getElementById('progressBar');
    const playPauseBtn = document.getElementById('playPause');
    const timeDisplay = document.getElementById('time');
    const cursor = document.getElementById('cursor');

    let audioCtx, analyzer, source, frequencyData, audioBuffer;
    let startTime = 0, pausedAt = 0, isPlaying = false, isInitialized = false;

    // --- 1. SYSTEM INTRO ---
    window.onload = () => {
        const lines = ["AUTHENTICATING...", "ALLOCATING_MATRIX...", "KYMATIX_READY."];
        let i = 0;
        const interval = setInterval(() => {
            document.getElementById('terminal').innerText = lines[i];
            i++;
            if(i === lines.length) {
                clearInterval(interval);
                setTimeout(() => {
                    intro.style.opacity = '0';
                    setTimeout(() => intro.remove(), 1500);
                }, 1000);
            }
        }, 800);
    };

    // --- 2. CORE ENGINE ---
    function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', initCanvas);
    initCanvas();

    window.addEventListener('mousemove', e => {
        cursor.style.transform = `translate(${e.clientX - 7}px, ${e.clientY - 7}px)`;
        if (isInitialized) {
            const threshold = 120;
            if (e.clientY < threshold || e.clientY > window.innerHeight - threshold) {
                ui.classList.remove('hidden');
                player.style.opacity = '1';
            } else {
                ui.classList.add('hidden');
                player.style.opacity = '0.3';
            }
        }
    });

    audioInput.onchange = function(e) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const reader = new FileReader();
        reader.onload = e => audioCtx.decodeAudioData(e.target.result, buffer => {
            audioBuffer = buffer;
            progressBar.max = buffer.duration;
            startPlayback(0);
            isInitialized = true;
            ui.classList.add('hidden');
            player.classList.remove('hidden');
            render();
        });
        reader.readAsArrayBuffer(this.files[0]);
    };

    function startPlayback(offset) {
        if (source) source.stop();
        source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        analyzer = audioCtx.createAnalyser();
        analyzer.fftSize = 512;
        source.connect(analyzer);
        analyzer.connect(audioCtx.destination);
        
        source.start(0, offset);
        startTime = audioCtx.currentTime - offset;
        frequencyData = new Uint8Array(analyzer.frequencyBinCount);
        isPlaying = true;
        playPauseBtn.innerText = "▌▌";
    }

    // --- 3. SEEKING & SCRUBBING ---
    progressBar.oninput = () => {
        const seekTime = parseFloat(progressBar.value);
        startPlayback(seekTime);
    };

    playPauseBtn.onclick = () => {
        if (audioCtx.state === 'running') {
            audioCtx.suspend();
            playPauseBtn.innerText = "▶";
        } else {
            audioCtx.resume();
            playPauseBtn.innerText = "▌▌";
        }
    };

    function render() {
        requestAnimationFrame(render);
        if (audioCtx.state === 'running' && isPlaying) {
            analyzer.getByteFrequencyData(frequencyData);
            
            // Update Progress
            const current = audioCtx.currentTime - startTime;
            progressBar.value = current;
            const mins = Math.floor(current / 60).toString().padStart(2, '0');
            const secs = Math.floor(current % 60).toString().padStart(2, '0');
            timeDisplay.innerText = `${mins}:${secs}`;

            // Draw Visuals
            ctx.fillStyle = 'rgba(5, 5, 8, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cx = canvas.width / 2, cy = canvas.height / 2;
            const bass = frequencyData[10];
            ui.style.setProperty('--line-width', `${60 + bass * 0.8}px`);

            for (let i = 0; i < 12; i++) {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate((Math.PI * 2 / 12) * i + (Date.now() * 0.0005));
                drawLayer(frequencyData);
                ctx.restore();
            }
        }
    }

    function drawLayer(data) {
        ctx.beginPath();
        const hue = (data[20] * 1.5) % 360;
        ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.8)`;
        ctx.lineWidth = 2;
        ctx.shadowBlur = 20;
        ctx.shadowColor = ctx.strokeStyle;

        for (let i = 0; i < data.length; i += 6) {
            const r = data[i] * 1.5 + i;
            const x = Math.cos(i) * r;
            const y = Math.sin(i) * r;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
    }
</script>
</body>
</html>
