<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kymatix // Obsidian Ultra</title>
    <style>
        :root {
            --accent: #f7d08a;
            --glass: rgba(15, 15, 26, 0.88);
            --line-width: 80px;
        }

        /* 1. Global & Typography Fix */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Syne', sans-serif; user-select: none; }
        body { background: #050508; color: white; overflow: hidden; cursor: none; }

        /* Custom Cursor */
        #cursor { position: fixed; width: 15px; height: 15px; border: 2px solid var(--accent); border-radius: 50%; pointer-events: none; z-index: 3000; transition: transform 0.06s linear; mix-blend-mode: difference; }

        /* 2. THE INTRO (Sleeker) */
        #intro-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: #050508; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .terminal-text { font-family: monospace; font-size: 0.75rem; color: var(--accent); margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }
        .loader-bar { width: 180px; height: 1px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .loader-progress { position: absolute; width: 100%; height: 100%; background: var(--accent); left: -100%; animation: load 2s ease-in-out forwards; }
        @keyframes load { to { left: 0; } }

        /* 3. THE UI BOX (Restored & Unsqueezed) */
        #ui-layer {
            position: fixed; z-index: 100;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--glass); backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 70px 90px; border-radius: 40px; text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            width: auto; min-width: 500px;
        }

        h1 { 
            font-size: 5.5rem; font-weight: 800; 
            letter-spacing: -2px; /* Fixed: was too squeezed */
            line-height: 1; margin: 0;
            background: linear-gradient(to bottom, #fff, #888); 
            background-clip: text; -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        h1::after { 
            content: ''; display: block; 
            width: var(--line-width); height: 4px; 
            background: var(--accent); margin: 30px auto 0; 
            border-radius: 10px; box-shadow: 0 0 25px var(--accent); 
            transition: width 0.15s ease-out; 
        }

        p.sub-status { letter-spacing: 6px; opacity: 0.4; margin-top: 15px; margin-bottom: 50px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }

        /* 4. THE PLAYER (Surgical Polish) */
        #player-container {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 450px; z-index: 101; background: var(--glass);
            padding: 15px 25px; border-radius: 100px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 20px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .btn { background: white; color: black; padding: 16px 35px; border-radius: 100px; font-weight: 800; cursor: pointer; border: none; font-size: 0.75rem; letter-spacing: 1px; }
        .play-pause-btn { background: none; color: white; border: 1px solid rgba(255,255,255,0.2); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; flex-shrink: 0; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; }

        input[type="range"] { flex-grow: 1; appearance: none; background: rgba(255,255,255,0.1); height: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--accent); }

        .hidden { opacity: 0; pointer-events: none; transform: translate(-50%, -40%) scale(0.95); }
        .player-hidden { opacity: 0; transform: translate(-50%, 20px); pointer-events: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="cursor"></div>

    <div id="intro-overlay">
        <div class="terminal-text" id="terminal">SYST_INIT: KYMATIX_CORE</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <h1>KYMATIX</h1>
        <p class="sub-status">EXPERIMENTAL AUDIO ENGINE</p>
        <div class="btn" style="position:relative;">
            INITIALIZE ENGINE
            <input type="file" id="audioInput" accept="audio/*" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
        </div>
    </div>

    <div id="player-container" class="player-hidden">
        <button id="playPause" class="play-pause-btn">PAUSE</button>
        <input type="range" id="progressBar" value="0" step="0.1">
        <span id="time" style="font-family: monospace; font-size: 0.7rem; opacity: 0.5;">00:00</span>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const intro = document.getElementById('intro-overlay');
    const ui = document.getElementById('ui-layer');
    const audioInput = document.getElementById('audioInput');
    const player = document.getElementById('player-container');
    const progressBar = document.getElementById('progressBar');
    const playPauseBtn = document.getElementById('playPause');
    const timeDisplay = document.getElementById('time');
    const cursor = document.getElementById('cursor');

    let audioCtx, analyzer, source, frequencyData, audioBuffer;
    let startTime = 0, pausedAt = 0, isPlaying = false, isInitialized = false;

    // Intro Sequence
    window.onload = () => {
        const lines = ["AUTHENTICATING", "BUILDING_MATRIX", "STABLE."];
        let i = 0;
        const log = setInterval(() => {
            document.getElementById('terminal').innerText = `SYST_INIT: ${lines[i]}`;
            if (++i === lines.length) {
                clearInterval(log);
                setTimeout(() => {
                    intro.style.opacity = '0';
                    setTimeout(() => intro.remove(), 1200);
                }, 800);
            }
        }, 600);
    };

    function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', initCanvas);
    initCanvas();

    window.addEventListener('mousemove', e => {
        cursor.style.transform = `translate(${e.clientX - 7}px, ${e.clientY - 7}px)`;
        if (isInitialized) {
            const edge = 130;
            if (e.clientY < edge || e.clientY > window.innerHeight - edge) {
                ui.classList.remove('hidden');
                player.classList.remove('player-hidden');
            } else {
                ui.classList.add('hidden');
                player.classList.add('player-hidden');
            }
        }
    });

    audioInput.onchange = function(e) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const reader = new FileReader();
        reader.onload = e => audioCtx.decodeAudioData(e.target.result, buffer => {
            audioBuffer = buffer;
            progressBar.max = buffer.duration;
            startPlayback(0);
            isInitialized = true;
            ui.classList.add('hidden');
            render();
        });
        reader.readAsArrayBuffer(this.files[0]);
    };

    function startPlayback(offset) {
        if (source) source.stop();
        source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        analyzer = audioCtx.createAnalyser();
        analyzer.fftSize = 512;
        source.connect(analyzer);
        analyzer.connect(audioCtx.destination);
        source.start(0, offset);
        startTime = audioCtx.currentTime - offset;
        frequencyData = new Uint8Array(analyzer.frequencyBinCount);
        isPlaying = true;
        playPauseBtn.innerText = "PAUSE";
    }

    progressBar.oninput = () => startPlayback(parseFloat(progressBar.value));

    playPauseBtn.onclick = () => {
        if (audioCtx.state === 'running') {
            audioCtx.suspend();
            playPauseBtn.innerText = "PLAY";
        } else {
            audioCtx.resume();
            playPauseBtn.innerText = "PAUSE";
        }
    };

    function render() {
        requestAnimationFrame(render);
        if (audioCtx.state === 'running' && isPlaying) {
            analyzer.getByteFrequencyData(frequencyData);
            
            const current = audioCtx.currentTime - startTime;
            progressBar.value = current;
            const mins = Math.floor(current / 60).toString().padStart(2, '0');
            const secs = Math.floor(current % 60).toString().padStart(2, '0');
            timeDisplay.innerText = `${mins}:${secs}`;

            ctx.fillStyle = 'rgba(5, 5, 8, 0.18)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cx = canvas.width / 2, cy = canvas.height / 2;
            ui.style.setProperty('--line-width', `${80 + frequencyData[10] * 0.8}px`);

            for (let i = 0; i < 12; i++) {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate((Math.PI * 2 / 12) * i + (Date.now() * 0.0005));
                drawLayer(frequencyData);
                ctx.restore();
            }
        }
    }

    function drawLayer(data) {
        ctx.beginPath();
        const hue = (data[20] * 1.5) % 360;
        ctx.strokeStyle = `hsla(${hue}, 80%, 65%, 0.8)`;
        ctx.lineWidth = 2;
        ctx.shadowBlur = 20;
        ctx.shadowColor = ctx.strokeStyle;
        for (let i = 0; i < data.length; i += 6) {
            const r = data[i] * 1.5 + i;
            const x = Math.cos(i) * r;
            const y = Math.sin(i) * r;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
    }
</script>
</body>
</html>
